<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details</title>
    <style>
        @media(max-width:540px){
            body{
                justify-content: unset !important;
            }
            .field{
                flex-direction: column;
                align-items: unset !important;
                margin: 20px;
            }
            label, span{
                margin: 0 !important;
                width: unset !important;
            }
        }
        html,body{
            height: 100%;
            margin: 0;
        }
        body{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .field{
            display: flex;
            align-items: center;
        }
        label, span{
            display: inline-block;
            font-size: 25px;
            margin: 20px;
            width: 200px;
        }
        input, select{
            font-size: 20px;
            margin: 13px 0;
            padding: 5px;
            width: 265px;
        }
        input[type=radio]{
            margin-right: 5px;
            height: 25px;
            width: 30px;
        }
        .gen{
            display: flex;
            align-items: center;
        }
        .gen label{
            font-size: 20px;
            margin: 0;
            width: unset;
        }
        select{
            width: 276px;
            margin: 15px 0;
        }
        input[type=submit]{
            display: block;
            margin: 30px auto;
            background-color: black;
            color: white;
            font-size: 27px;
            width: 100px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <script>
        let params = window.location.search.substring(1);
        if (params.length != 0){
            const reg = new RegExp("%20",'g');
            let a = params.replace(reg, ' ');
            alert(a);
        }
    </script>
    <form action="/includes/details.php" method="post">
        <div class="field">
            <label for="name">Enter Your Name</label>
            <input type="text" name="name" id="name" autocomplete="name" required>
        </div>
        <div class="field">
            <label for="dob">Date of Birth</label>
            <input type="date" name="dob" id="dob" autocomplete="bday-day" required>
        </div>
        <div class="field">
            <span id="gender">Gender</span>
            <div class="gen">
                <input type="radio" value="m" name="gender" id="male" aria-labelledby="gender male" required><label for="male" style="margin-right: 60px !important;">Male</label>
                <input type="radio" value="f" name="gender" id="female" aria-labelledby="gender female"><label for="female">Female</label>
            </div>
        </div>
        <div class="field">
            <label for="height">Height</label>
            <input type="number" step="0.01" min="3" max="8" name="height" id="height" placeholder="in Ft" required>
        </div>
        <div class="field">
            <label for="weight">Weight</label>
            <input type="number" step="0.01" min="30" max="200" name="weight" id="weight" placeholder="in Kgs" required>
        </div>
        <div class="field">
            <label for="goal">Your Goal</label>
            <select name="goal" id="goal" required>
                <option value="" disabled selected hidden>-select-</option>
                <option value="weight loss">Weight loss</option>
                <option value="fitness">Fitness</option>
                <option value="muscle growth">Muscle growth</option>
            </select>
        </div>
        <div class="field">
            <label for="mealcnt">Meals per day</label>
            <select name="mealcnt" id="mealcnt" required>
                <option value="" disabled selected hidden>-select-</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
            </select>
        </div>
        <input type="submit" value="Submit">
    </form>
</body>
</html>
